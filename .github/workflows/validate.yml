name: Validate Harbor task

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Harbor
        run: |
          python -m pip install --disable-pip-version-check uv
          python -m uv tool install harbor
          "$HOME/.local/bin/harbor" --version

      - name: Oracle must pass
        run: |
          "$HOME/.local/bin/harbor" run -p . --agent oracle
          job_dir="$(dirname "$(find jobs -name result.json -printf '%T@ %p\n' | sort -n | tail -1 | cut -d' ' -f2-)")"
          echo "=== Oracle verifier artifacts ==="
          find "$job_dir" -type f \( -name reward.txt -o -name ctrf.json \) -print -exec cat {} \;

      - name: Nop must fail verification
        run: |
          "$HOME/.local/bin/harbor" run -p . --agent nop
          job_dir="$(dirname "$(find jobs -name result.json -printf '%T@ %p\n' | sort -n | tail -1 | cut -d' ' -f2-)")"
          echo "=== Nop verifier artifacts ==="
          find "$job_dir" -type f \( -name reward.txt -o -name ctrf.json \) -print -exec cat {} \;
